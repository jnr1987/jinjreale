<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JINJREALE</title>
    <style>
        :root {
            --primary: #1F4E78;
            --secondary: #D9E1F2;
            --accent: #E2EFDA;
            --text: #333;
            --bg: #f4f7f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }
        .section-title {
            background-color: var(--secondary);
            color: var(--primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 20px;
            font-size: 1.1rem;
        }
        .form-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .form-group label {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .form-group input {
            width: 90px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            text-align: right;
            font-size: 1rem;
        }
        .form-group span.note {
            display: block;
            font-size: 0.75rem;
            color: #777;
            margin-top: 2px;
        }
        .calc-btn {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: #fff;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 25px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .calc-btn:hover {
            opacity: 0.9;
        }
        .result-box {
            background-color: var(--accent);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #c3d69b;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.05rem;
            padding: 5px 0;
        }
        .result-item.sub {
            font-size: 0.9rem;
            color: #555;
            font-weight: normal;
        }
        .result-item.highlight {
            font-size: 1.3rem;
            color: var(--primary);
            border-top: 2px dashed #a9c08a;
            padding-top: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>JINJREALE</h1>

    <div class="section-title">1. 算定基礎額</div>
    <div class="form-group">
        <div>
            <label>基礎額合計 (円)</label>
            <span class="note">職務能力給＋マネジメント手当＋業務手当＋住宅等手当（地域額）</span>
        </div>
        <input type="number" id="baseSalary" value="295000">
    </div>

    <div class="section-title">2. 超勤・休日勤務 (hh:mm)</div>
    <div class="form-group">
        <div>
            <label>A時間 (100%)</label>
        </div>
        <input type="text" id="timeA" value="00:00" placeholder="00:00">
    </div>
    <div class="form-group">
        <div>
            <label>B時間 (超勤 130%)</label>
        </div>
        <input type="text" id="timeB" value="00:00" placeholder="00:00">
    </div>
    <div class="form-group">
        <div>
            <label>D時間 (休出 135%)</label>
        </div>
        <input type="text" id="timeD" value="00:00" placeholder="00:00">
    </div>
    <div class="form-group">
        <div>
            <label>E時間 (60h超 150%)</label>
        </div>
        <input type="text" id="timeE" value="00:00" placeholder="00:00">
    </div>

    <div class="section-title">3. 特定時間割増 (hh:mm)</div>
    <div class="form-group">
        <div>
            <label>C時間 (深夜 45%)</label>
        </div>
        <input type="text" id="timeC" value="00:00" placeholder="00:00">
    </div>
    <div class="form-group">
        <div>
            <label>F時間 (夜明 30%)</label>
        </div>
        <input type="text" id="timeF" value="00:00" placeholder="00:00">
    </div>
    <div class="form-group">
        <div>
            <label>G時間 (夕朝 15%)</label>
        </div>
        <input type="text" id="timeG" value="00:00" placeholder="00:00">
    </div>

    <div class="section-title">4. 控除額 (天引き)</div>
    <div class="form-group">
        <div>
            <label>控除額合計 (円)</label>
        </div>
        <input type="number" id="deductions" value="0">
    </div>

    <button class="calc-btn" onclick="calculateSalary()">手取りを計算する</button>

    <div class="result-box" id="resultBox" style="display: none;">
        <div class="result-item sub">
            <span>適用時給単価 (149.9割):</span>
            <span id="resHourly">¥0</span>
        </div>
        <div class="result-item">
            <span>変動手当 合計:</span>
            <span id="resAllowance">¥0</span>
        </div>
        <div class="result-item">
            <span>総支給額 (額面):</span>
            <span id="resTotal">¥0</span>
        </div>
        <div class="result-item highlight">
            <span>予測手取り額:</span>
            <span id="resNet">¥0</span>
        </div>
    </div>
</div>

<script>
    function parseTime(timeStr) {
        if (!timeStr || !timeStr.includes(':')) return 0;
        const parts = timeStr.split(':');
        const h = parseInt(parts[0], 10) || 0;
        const m = parseInt(parts[1], 10) || 0;
        return h + (m / 60);
    }

    function calculateSalary() {
        const baseSalary = parseInt(document.getElementById('baseSalary').value, 10) || 0;
        const deductions = parseInt(document.getElementById('deductions').value, 10) || 0;

        // 第108条: 149.9で割り、1銭(0.01)未満切り上げ
        let rawHourly = baseSalary / 149.9;
        let hourlyWage = Math.ceil(rawHourly * 100) / 100;

        // 第109条: 単価ごとに掛率を乗じ、四捨五入(50銭以上切り上げ)
        const priceA = Math.round(hourlyWage * 1.00);
        const priceB = Math.round(hourlyWage * 1.30);
        const priceC = Math.round(hourlyWage * 0.45);
        const priceD = Math.round(hourlyWage * 1.35);
        const priceE = Math.round(hourlyWage * 1.50);
        const priceF = Math.round(hourlyWage * 0.30);
        const priceG = Math.round(hourlyWage * 0.15);

        // 入力時間の取得
        const timeA = parseTime(document.getElementById('timeA').value);
        const timeB = parseTime(document.getElementById('timeB').value);
        const timeC = parseTime(document.getElementById('timeC').value);
        const timeD = parseTime(document.getElementById('timeD').value);
        const timeE = parseTime(document.getElementById('timeE').value);
        const timeF = parseTime(document.getElementById('timeF').value);
        const timeG = parseTime(document.getElementById('timeG').value);

        // 手当額の計算 (支給額は通常、最終切り捨て)
        const totalAllowance = 
            Math.floor(priceA * timeA) +
            Math.floor(priceB * timeB) +
            Math.floor(priceC * timeC) +
            Math.floor(priceD * timeD) +
            Math.floor(priceE * timeE) +
            Math.floor(priceF * timeF) +
            Math.floor(priceG * timeG);

        const grossSalary = baseSalary + totalAllowance;
        const netSalary = grossSalary - deductions;

        document.getElementById('resHourly').innerText = '¥' + hourlyWage.toFixed(2);
        document.getElementById('resAllowance').innerText = '¥' + totalAllowance.toLocaleString();
        document.getElementById('resTotal').innerText = '¥' + grossSalary.toLocaleString();
        document.getElementById('resNet').innerText = '¥' + netSalary.toLocaleString();
        
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
